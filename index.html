<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberSaaS Pro - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #161616; --red: #ff4d4d; --green: #2ecc71; --white: #eeeeee; }
        body { background-color: var(--dark); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; }
        #pLanding { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); }
        .hero-title { color: var(--gold); font-size: 32px; text-transform: uppercase; margin-bottom: 10px; }
        .hero-sub { font-size: 18px; color: #ccc; margin-bottom: 30px; line-height: 1.5; }
        .features { text-align: left; max-width: 500px; margin: 0 auto 30px auto; }
        .feature-item { display: flex; align-items: center; margin-bottom: 15px; font-size: 16px; }
        .feature-item span { color: var(--gold); margin-right: 10px; font-size: 20px; }
        .page { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .active { display: block !important; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 16px; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-zap { background: #25d366; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; margin-top: 5px; width: 100%; }
        code { display: block; background: #000; padding: 10px; border-radius: 5px; color: var(--gold); font-size: 11px; word-break: break-all; margin-top: 10px; border: 1px dashed var(--gold); }
        .btn-del { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 20px; position: absolute; top: 10px; right: 10px; }
    </style>
</head>
<body>

    <div id="pLanding" class="page active">
        <h1 class="hero-title">BarberSaaS Pro</h1>
        <p class="hero-sub">O sistema inovador com Fidelidade e WhatsApp.</p>
        <div class="features">
            <div class="feature-item"><span>✔</span> Fidelidade Digital</div>
            <div class="feature-item"><span>✔</span> Notificação via WhatsApp</div>
        </div>
        <button class="btn btn-gold" onclick="trocarTela('pAuth')">ACESSAR MEU PAINEL</button>
    </div>

    <div id="pAgendar" class="page">
        <h2 id="nomeBarbeariaAgendar" style="color:var(--gold); text-align:center;"></h2>
        <div class="card">
            <div id="listaServicosMultiplos"></div>
            <h3 style="text-align:right">Total: R$ <span id="valorTotalCliente">0.00</span></h3>
            <input type="text" id="cNome" placeholder="Seu Nome">
            <input type="tel" id="cZap" placeholder="WhatsApp (DDD + Número)">
            <input type="datetime-local" id="dataHoraAgendamento">
            <button class="btn btn-gold" id="btnConfirmar" onclick="confirmarAgendamento()">FINALIZAR AGENDAMENTO</button>
        </div>
    </div>

    <div id="pAuth" class="page">
        <h1 style="color:var(--gold); text-align:center;">BarberSaaS</h1>
        <div class="card">
            <input type="email" id="uEmail" placeholder="E-mail">
            <input type="password" id="uSenha" placeholder="Senha">
            <button class="btn btn-gold" onclick="autenticar()">ENTRAR</button>
            <p style="text-align:center; cursor:pointer;" onclick="trocarTela('pCadastro')">Criar Nova Conta</p>
        </div>
    </div>

    <div id="pCadastro" class="page">
        <div class="card">
            <input type="text" id="regNome" placeholder="Nome da Barbearia">
            <input type="email" id="regEmail" placeholder="E-mail">
            <input type="password" id="regSenha" placeholder="Senha">
            <button class="btn btn-green" onclick="registrarBarbeiro()">CADASTRAR</button>
        </div>
    </div>

    <div id="pBarbeiro" class="page">
        <h2 id="nomeDaBarbeariaExibicao" style="color:var(--gold); text-align:center;"></h2>
        <div class="card">
            <h3>💰 FATURAMENTO: R$ <span id="valFaturamento">0.00</span></h3>
            <button onclick="zerarFaturamento()" style="background:none; color:gray; border:none;">[Zerar]</button>
        </div>
        <div class="card">
            <h3>📅 Agendamentos</h3>
            <div id="listaAgendamentos"></div>
        </div>
        <button class="btn btn-red" onclick="sair()">SAIR</button>
    </div>

    <div id="pMaster" class="page">
        <h2 style="color:var(--gold); text-align:center;">👑 ADMIN</h2>
        <div id="listaBarbeirosMaster"></div>
        <button class="btn btn-red" onclick="sair()">SAIR</button>
    </div>

<script>
    const URL_SB = atob("aHR0cHM6Ly9yZXJ1Y3B0b3hic2VuZnJvc2pncS5zdXBhYmFzZS5jbw==");
    const KEY_SB = atob("c2JfcHVibGlzaGFibGVfTXVELW9WOGF5a3BKZ2Ryb0lRakV6d19La2liXzRZVw==");
    const sb = window.supabase.createClient(URL_SB, KEY_SB);
    
    let logado_id = null;
    let faturamentoDia = 0;
    const barbeiro_alvo_id = new URLSearchParams(window.location.search).get('id');

    window.onload = async () => {
        const salvo = localStorage.getItem('faturamento_barber');
        if(salvo) faturamentoDia = parseFloat(salvo);
        document.getElementById('valFaturamento').innerText = faturamentoDia.toFixed(2);

        if(barbeiro_alvo_id) {
            const { data } = await sb.from('perfil_barbeiro').select('*').eq('id', barbeiro_alvo_id).maybeSingle();
            if(data && data.status_pagamento === 'Ativo') {
                document.getElementById('nomeBarbeariaAgendar').innerText = data.nome_salao;
                trocarTela('pAgendar');
                carregarServicosParaCliente();
            }
        }
    };

    function avisarNoZap(tel, nome, servico, data) {
        const msg = `Olá ${nome}! Seu horário para ${servico} em ${new Date(data).toLocaleString()} está confirmado!`;
        window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    async function confirmarAgendamento() {
        const n = document.getElementById('cNome').value;
        const z = document.getElementById('cZap').value.replace(/\D/g, '');
        const d = document.getElementById('dataHoraAgendamento').value;
        const v = document.getElementById('valorTotalCliente').innerText;
        
        if(!n || !z || !d) return alert("Preencha tudo!");

        await sb.from('agendamentos').insert([{ 
            cliente_nome: n, 
            cliente_zap: z, 
            data_hora: d, 
            barbeiro_id: barbeiro_alvo_id,
            comentario_cliente: `R$ ${v}` 
        }]);
        alert("Sucesso!"); location.reload();
    }

    async function finalizarCorte(id, valorStr) {
        const v = parseFloat(valorStr.replace('R$ ', '')) || 0;
        faturamentoDia += v;
        localStorage.setItem('faturamento_barber', faturamentoDia);
        document.getElementById('valFaturamento').innerText = faturamentoDia.toFixed(2);
        await sb.from('agendamentos').delete().eq('id', id);
        carregarAgendamentos();
    }

    async function carregarAgendamentos() {
        const { data } = await sb.from('agendamentos').select('*').eq('barbeiro_id', logado_id).order('data_hora', {ascending: true});
        if(data) {
            document.getElementById('listaAgendamentos').innerHTML = data.map(a => `
                <div class="card">
                    <b>${a.cliente_nome}</b><br>
                    <small>${new Date(a.data_hora).toLocaleString()}</small><br>
                    <button class="btn-zap" onclick="avisarNoZap('${a.cliente_zap}','${a.cliente_nome}','${a.comentario_cliente}','${a.data_hora}')">WHATSAPP</button>
                    <button class="btn btn-green" style="padding:10px; font-size:12px;" onclick="finalizarCorte('${a.id}','${a.comentario_cliente}')">CONCLUIR ✅</button>
                </div>
            `).join('');
        }
    }

    async function autenticar() {
        const e = document.getElementById('uEmail').value;
        const s = document.getElementById('uSenha').value;
        const { data } = await sb.from('perfil_barbeiro').select('*').eq('email', e).eq('senha', s).maybeSingle();
        if (data) {
            if (data.email === atob("ZWRpZ2l0YWw2MzJAZ21haWwuY29t")) { trocarTela('pMaster'); carregarMaster(); return; }
            logado_id = data.id;
            trocarTela('pBarbeiro'); carregarAgendamentos();
        }
    }

    async function carregarMaster() {
        const { data } = await sb.from('perfil_barbeiro').select('*');
        if(data) document.getElementById('listaBarbeirosMaster').innerHTML = data.map(b => `
            <div class="card">
                <b>${b.nome_salao}</b>
                <button class="btn-del" onclick="deletarBarbeiro('${b.id}')">🗑️</button>
            </div>
        `).join('');
    }

    async function deletarBarbeiro(id) {
        if(confirm("Apagar barbeiro?")) {
            await sb.from('servicos').delete().eq('barbeiro_id', id);
            await sb.from('agendamentos').delete().eq('barbeiro_id', id);
            await sb.from('perfil_barbeiro').delete().eq('id', id);
            carregarMaster();
        }
    }

    function trocarTela(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function sair() { window.location.search = ""; window.location.reload(); }
    function zerarFaturamento() { faturamentoDia = 0; localStorage.setItem('faturamento_barber', 0); location.reload(); }
    async function registrarBarbeiro() {
        const n = document.getElementById('regNome').value;
        const e = document.getElementById('regEmail').value;
        const s = document.getElementById('regSenha').value;
        await sb.from('perfil_barbeiro').insert([{ nome_salao: n, email: e, senha: s, status_pagamento: 'Ativo' }]);
        alert("Cadastrado!"); trocarTela('pAuth');
    }
</script>
</body>
</html>
