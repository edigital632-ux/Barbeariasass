<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberSaaS Pro - Painel Master</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; margin: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; }
        .titulo { color: #f1c40f; font-size: 32px; font-weight: bold; margin: 10px 0; display: block; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #333; background: #111; color: white; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: #f1c40f; border: none; 
            border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #status-msg { margin-top: 20px; font-size: 14px; color: #ff4d4d; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <span style="font-size: 60px;">📅</span>
        <span class="titulo">BarberSaaS Pro</span>
        <p style="color: #888;">Painel Master de Gestão</p>

        <div id="login-area">
            <input type="email" id="email-input" placeholder="Seu e-mail">
            <input type="password" id="senha-input" placeholder="Sua senha">
            <button id="btn-login">ENTRAR NO SISTEMA</button>
        </div>

        <div id="status-msg"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // --- 1. CONFIGURAÇÃO (COLE SEUS DADOS AQUI) ---
        const SUPABASE_URL = 'https://SUA_URL_AQUI.supabase.co'; 
        const SUPABASE_KEY = 'SUA_KEY_ANON_AQUI';
        // ----------------------------------------------

        const statusMsg = document.getElementById('status-msg');

        // Inicialização protegida
        let supabase;
        if (SUPABASE_URL.includes('SUA_URL_AQUI')) {
            statusMsg.innerText = "Erro: Configure a URL e a Key do Supabase no código.";
        } else {
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        async function executarLogin() {
            if (!supabase) {
                statusMsg.innerText = "Erro: Supabase não inicializado.";
                return;
            }

            const email = document.getElementById('email-input').value;
            const senha = document.getElementById('senha-input').value;

            try {
                statusMsg.style.color = "#888";
                statusMsg.innerText = "Autenticando...";

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (error) throw error;

                statusMsg.style.color = "#27ae60";
                statusMsg.innerText = "Login realizado! Redirecionando...";
                
                // Salva o usuário no localStorage e redireciona (exemplo)
                setTimeout(() => { location.reload(); }, 1500);

            } catch (err) {
                statusMsg.style.color = "#ff4d4d";
                statusMsg.innerText = "Erro: " + err.message;
            }
        }

        // Event Listener para evitar erro de "not defined"
        document.getElementById('btn-login').addEventListener('click', executarLogin);

    </script>
</body>
</html>
